name: aitoearn-test

services:
  aitoearn-init:
    image: node:lts-alpine
    container_name: aitoearn-test-init
    restart: "no"
    env_file:
      - ./.env
    working_dir: /app
    volumes:
      - ./scripts/init.mjs:/app/init.mjs:ro
      - ./scripts/init-package.json:/app/package.json:ro
      - init-data:/data/init
    entrypoint: /bin/sh -c "npm install --omit=dev 2>/dev/null && node init.mjs"
    networks:
      - aitoearn-network

  aitoearn-ai:
    image: ${IMAGE_PREFIX}/aitoearn-ai:${IMAGE_TAG:-test-latest}
    container_name: aitoearn-test-ai
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./config/aitoearn-ai.config.js:/app/config.js:ro
    environment:
      NODE_ENV: production
      APP_ENV: production
      APP_NAME: aitoearn-ai
      SERVER_URL: http://aitoearn-server:3002
    networks:
      - aitoearn-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3010/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  aitoearn-server:
    image: ${IMAGE_PREFIX}/aitoearn-server:${IMAGE_TAG:-test-latest}
    container_name: aitoearn-test-server
    restart: unless-stopped
    depends_on:
      aitoearn-ai:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - ./config/aitoearn-server.config.js:/app/config.js:ro
    environment:
      NODE_ENV: production
      APP_ENV: production
      APP_NAME: aitoearn-server
      AI_URL: http://aitoearn-ai:3010
    networks:
      - aitoearn-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  aitoearn-web:
    image: ${IMAGE_PREFIX}/aitoearn-web:${IMAGE_TAG:-test-latest}
    container_name: aitoearn-test-web
    restart: unless-stopped
    depends_on:
      aitoearn-server:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - init-data:/data/init:ro
    command: ["/bin/sh", "-c", "AUTO_LOGIN_TOKEN=$$(cat /data/init/token.txt 2>/dev/null || echo '') exec node server.js"]
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - aitoearn-network

  nginx:
    image: nginx:alpine
    container_name: aitoearn-test-nginx
    restart: unless-stopped
    depends_on:
      aitoearn-web:
        condition: service_started
      aitoearn-server:
        condition: service_healthy
      aitoearn-ai:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8081}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - aitoearn-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/_nhealth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  aitoearn-network:
    name: aitoearn-test-network
    driver: bridge

volumes:
  init-data:
    name: aitoearn-test-init-data
