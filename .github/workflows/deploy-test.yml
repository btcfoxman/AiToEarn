name: Deploy Test

on:
  push:
    branches:
      - test
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG_LATEST: test-latest
  BACKEND_DIR: project/aitoearn-backend
  WEB_DIR: project/aitoearn-web

jobs:
  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.meta.outputs.image_prefix }}
      image_sha_tag: ${{ steps.meta.outputs.image_sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare image metadata
        id: meta
        run: |
          image_prefix="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="$(git rev-parse --short HEAD)"
          echo "image_prefix=${image_prefix}" >> "${GITHUB_OUTPUT}"
          echo "image_sha_tag=test-${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WEB_DIR }}
          file: ${{ env.WEB_DIR }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/aitoearn-web:${{ env.IMAGE_TAG_LATEST }}
            ${{ steps.meta.outputs.image_prefix }}/aitoearn-web:${{ steps.meta.outputs.image_sha_tag }}
          cache-from: type=gha,scope=aitoearn-web
          cache-to: type=gha,mode=max,scope=aitoearn-web
          provenance: false
          sbom: false

  build-backend:
    name: Build backend images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - aitoearn-ai
          - aitoearn-server
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.BACKEND_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Prepare Docker context
        working-directory: ${{ env.BACKEND_DIR }}
        run: pnpm nx run ${{ matrix.app }}:docker-context

      - name: Prepare image metadata
        id: meta
        run: |
          image_prefix="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="$(git rev-parse --short HEAD)"
          echo "image_prefix=${image_prefix}" >> "${GITHUB_OUTPUT}"
          echo "image_sha_tag=test-${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}/tmp/docker-context
          file: ${{ env.BACKEND_DIR }}/tmp/docker-context/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_NAME=${{ matrix.app }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/${{ matrix.app }}:${{ env.IMAGE_TAG_LATEST }}
            ${{ steps.meta.outputs.image_prefix }}/${{ matrix.app }}:${{ steps.meta.outputs.image_sha_tag }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          provenance: false
          sbom: false

  deploy:
    name: Deploy to 192.168.3.6
    needs:
      - build-web
      - build-backend
    runs-on:
      - self-hosted
      - linux
      - aitoearn-test
    env:
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APP_DIR: /home/btcfoxman/docker/aitoearn
      APP_PORT: "8081"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy
        run: bash deploy/test/deploy.sh
